services:
  db:
    image: mariadb:latest
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD} 
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${USERNAME}
      MYSQL_PASSWORD: ${PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
      
      
  php:
    build: .
    volumes:
      - ./src:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${USERNAME}
      DB_PASSWORD: ${PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - app-network
  
networks:
  app-network:
    driver: bridge

volumes:
  db_data: